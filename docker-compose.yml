name: emby-manager-rs

services:
  emby-manager-rs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EMBY_MANAGER_UID: ${EMBY_MANAGER_UID:-10001}
        EMBY_MANAGER_GID: ${EMBY_MANAGER_GID:-10001}
    image: ghcr.io/ggttol/emby-manager:rs-dev
    container_name: emby-manager-rs
    user: "${EMBY_MANAGER_UID:-10001}:${EMBY_MANAGER_GID:-10001}"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-emby_manager}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-emby_manager}
      EMBY_MANAGER_HOST: 0.0.0.0
      EMBY_MANAGER_PORT: 8098
      EMBY_MANAGER_WEB_DIST: /app/web
      EMBY_MANAGER_LEGACY_DIR: /legacy
      EMBY_MANAGER_CD_ROOT: /media
      EMBY_MANAGER_STRM_ROOT: /strm
      EMBY_MANAGER_BOOTSTRAP_PASSWORD: ${EMBY_MANAGER_BOOTSTRAP_PASSWORD:?set EMBY_MANAGER_BOOTSTRAP_PASSWORD in .env}
      RUST_LOG: ${RUST_LOG:-emby_manager=info,tower_http=info}
    ports:
      - "${EMBY_MANAGER_BIND_IP:-127.0.0.1}:${EMBY_MANAGER_HTTP_PORT:-8098}:8098"
    volumes:
      - ${EMBY_MANAGER_LEGACY_DIR:-./legacy}:/legacy:ro
      - ${EMBY_MANAGER_DATA_DIR:-./data}:/data
      - ${EMBY_MANAGER_STRM_ROOT:-/volume1/strm}:/strm:${EMBY_MANAGER_STRM_MODE:-ro}
      - ${EMBY_MANAGER_MEDIA_ROOT:-/volume1/docker/clouddrive2/CloudNAS/CloudDrive}:/media:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8098/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: emby-manager-rs-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emby_manager}
      POSTGRES_USER: ${POSTGRES_USER:-emby_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
